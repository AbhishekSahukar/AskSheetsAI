<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up — AskSheets</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="/static/app.js" defer></script>
</head>
<body class="auth-body">
  <main class="auth-wrapper">
    <div class="auth-card glossy">
      <h1 class="auth-title">💬 AskSheets</h1>
      <p class="auth-subtitle">Create your account</p>

      <p id="signupError" class="auth-error" style="display:none;"></p>

      <form id="signupForm" class="auth-form">
        <input type="text" id="newUsername" name="username" placeholder="Username" required autocomplete="username" />
        <input type="email" id="newEmail" name="email" placeholder="Email" required autocomplete="email" />
        <input type="password" id="newPassword" name="password" placeholder="Password" required autocomplete="new-password" />
        <button type="submit" class="auth-btn">Create account</button>
      </form>

      <p class="auth-switch">
        Already have an account? <a href="/login">Log in</a>
      </p>
    </div>
  </main>
</body>
</html>

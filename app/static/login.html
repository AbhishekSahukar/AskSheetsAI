<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login - AskSheets</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script src="/static/app.js" defer></script>
</head>
<body class="auth-body">
  <main class="auth-wrapper">
    <div class="auth-card glossy">
      <h1 class="auth-title">🔐 AskSheets</h1>
      <p class="auth-subtitle">Log in to continue</p>

      <form id="loginForm" class="auth-form">
        <!-- ✅ Added name attributes -->
        <input type="text" id="username" name="username" placeholder="Username" required />
        <input type="password" id="password" name="password" placeholder="Password" required />
        <button type="submit" class="auth-btn">Login</button>
      </form>

      <p class="auth-switch">
        Don’t have an account? <a href="/static/signup.html">Sign up</a>
      </p>
    </div>
  </main>
</body>
</html>
